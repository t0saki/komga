name: Build & Push (GHCR)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: komga-webui/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build webui + jar
        run: ./gradlew :komga:prepareThymeLeaf :komga:bootJar -x test
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Stage docker context
        run: |
          mkdir -p docker-ctx
          cp komga/build/libs/komga-*.jar docker-ctx/application.jar
          cp komga/docker/Dockerfile.fork docker-ctx/Dockerfile

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/komga
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: docker-ctx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
